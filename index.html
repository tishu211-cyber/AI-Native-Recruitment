function FadeIn({ children, delay = 0, y = 10, style = {} }) {
  const [s, setS] = useState(false);
  useEffect(() => { const t = setTimeout(() => setS(true), delay); return () => clearTimeout(t); }, [delay]);
  return <div style={{ opacity: s ? 1 : 0, transform: s ? "translateY(0)" : `translateY(${y}px)`, transition: "all 0.5s ease", ...style }}>{children}</div>;
}

  if (src === "LinkedIn") {

  const logo = LOGOS[src] || { bg: "#94a3b8", text: "??", fg: "#fff" };
  return <g transform={`translate(${x}, ${y})`} opacity={opacity}>
    <rect width={22} height={18} rx={3} fill={logo.bg} />
    <text x={11} y={13} textAnchor="middle" fontSize="7" fontWeight="800" fill={logo.fg} fontFamily="Arial, sans-serif">{logo.text}</text>
  </g>;

function UnifiedGraphTab() {
  const [hov, setHov] = useState(null);
  const ht = hov?.type === "task" ? GRAPH_TASKS.find(t => t.id === hov.id) : null;
  const hs = hov?.type === "skill" ? hov.id : null;
  const hc = hov?.type === "cand" ? GRAPH_CANDS.find(c => c.id === hov.id) : null;
  const ha = hov?.type === "act" ? hov : null;

  // Build active skills set — includes adjacency when hovering a skill
  const actS = new Set();
  if (ht) ht.skills.forEach(s => actS.add(s.id));
  if (hs) {
    actS.add(hs);
    SKILL_ADJ.forEach(r => { if (r.from === hs) actS.add(r.to); if (r.to === hs) actS.add(r.from); });
  }
  if (hc) { hc.skills.forEach(s => actS.add(s.id)); hc.gaps.forEach(s => actS.add(s)); }
  if (ha) {
    const parentCand = GRAPH_CANDS[ha.ci];
    parentCand.activities[ha.ai].evidences.forEach(s => actS.add(s));
    parentCand.skills.forEach(s => actS.add(s.id));
    parentCand.gaps.forEach(s => actS.add(s));
  }

  const isTa = (t) => !hov || ht?.id === t.id || (hs && t.skills.some(s => s.id === hs || actS.has(s.id))) || (hc && t.skills.some(s => hc.skills.some(cs => cs.id === s.id))) || (ha && t.skills.some(s => actS.has(s.id)));
  const isCa = (c) => !hov || hc?.id === c.id || (ha && GRAPH_CANDS.indexOf(c) === ha.ci) || (hs && (c.skills.some(s => s.id === hs) || c.gaps.includes(hs))) || (ht && ht.skills.some(s => c.skills.some(cs => cs.id === s.id)));
  const isSa = (s) => !hov || actS.has(s);

  const demS = new Set(GRAPH_TASKS.flatMap(t => t.skills.map(s => s.id)));
  const bestS = new Set(GRAPH_CANDS[2].skills.map(s => s.id));

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "6px" }}>
        <span style={{ fontSize: "11px", color: C.slateMd }}>Hover any node to trace connections. Edge thickness = importance/proficiency. Skills show market signals + adjacency.</span>
        <div style={{ display: "flex", gap: "8px" }}>
          {[{ c: C.blue, l: "Task" }, { c: "#8b5cf6", l: "Skill" }, { c: C.green, l: "Match" }, { c: C.red, l: "Gap" }, { c: "#f59e0b", l: "Activity" }, { c: "#c4b5fd", l: "Adjacent" }].map((i, j) => (
            <div key={j} style={{ display: "flex", alignItems: "center", gap: "3px" }}><div style={{ width: 7, height: 7, borderRadius: "50%", background: i.c }} /><span style={{ fontSize: "9px", color: C.slateLight }}>{i.l}</span></div>
          ))}
        </div>
      </div>
      <svg width="1060" height="590" style={{ background: C.card, borderRadius: "10px", border: "1px solid " + C.border }}>
        <text x={LX.tasks + 80} y="16" textAnchor="middle" fontSize="8" fontWeight="700" letterSpacing="1.2" fill={C.blue}>EXPECTED UNMET</text>
        <text x={LX.tasks + 80} y="26" textAnchor="middle" fontSize="8" fontWeight="700" letterSpacing="1.2" fill={C.blue}>WORK CAPACITY</text>
        <text x={LX.skills + 55} y="22" textAnchor="middle" fontSize="8" fontWeight="700" letterSpacing="1.2" fill="#8b5cf6">SKILLS</text>
        <text x={LX.cands + 65} y="22" textAnchor="middle" fontSize="8" fontWeight="700" letterSpacing="1.2" fill={C.slate}>CANDIDATES</text>
        <text x={LX.acts + 120} y="22" textAnchor="middle" fontSize="8" fontWeight="700" letterSpacing="1.2" fill="#b45309">OBSERVED ACTIVITY</text>

        {/* Skill adjacency */}
        {SKILL_ADJ.map((r, i) => {
          const s1 = SKILLS.findIndex(s => s.id === r.from), s2 = SKILLS.findIndex(s => s.id === r.to);
          if (s1 < 0 || s2 < 0) return null;
          const on = isSa(r.from) && isSa(r.to);
          return <line key={"adj" + i} x1={LX.skills + 118} y1={sY(s1) + 12} x2={LX.skills + 118} y2={sY(s2) + 12}
            stroke="#c4b5fd" strokeWidth={on ? 1 : 0.3} opacity={on ? 0.3 : 0.04} strokeDasharray="2,4" style={{ transition: "all 0.3s" }} />;
        })}
        {/* Task->Skill (thickness by importance) */}
        {GRAPH_TASKS.map(t => t.skills.map(sk => {
          const si = SKILLS.findIndex(s => s.id === sk.id); if (si < 0) return null;
          const on = isTa(t) && isSa(sk.id);
          return <line key={"ts-" + t.id + "-" + sk.id} x1={LX.tasks + 180} y1={tY(GRAPH_TASKS.indexOf(t)) + 17} x2={LX.skills} y2={sY(si) + 12}
            stroke={C.blue} strokeWidth={on ? (sk.imp === "must" ? 1.5 : 0.7) : 0.2} opacity={on ? 0.35 : 0.03}
            strokeDasharray={sk.imp === "must" ? "none" : "3,3"} style={{ transition: "all 0.3s" }} />;
        }))}
        {/* Cand->Skill (thickness by proficiency) */}
        {GRAPH_CANDS.map((c, ci) => c.skills.map(sk => {
          const si = SKILLS.findIndex(s => s.id === sk.id); if (si < 0) return null;
          const m = demS.has(sk.id); const on = isCa(c) && isSa(sk.id);
          return <line key={"cs-" + c.id + "-" + sk.id} x1={LX.cands} y1={cY(ci) + 22} x2={LX.skills + 118} y2={sY(si) + 12}
            stroke={m ? C.green : C.slateLight} strokeWidth={on ? sk.prof * 2.5 : 0.2} opacity={on ? 0.4 : 0.02} style={{ transition: "all 0.3s" }} />;
        }))}
        {/* Cand->Skill gaps */}
        {GRAPH_CANDS.map((c, ci) => c.gaps.map(sk => {
          const si = SKILLS.findIndex(s => s.id === sk); if (si < 0) return null;
          const on = isCa(c);
          return <line key={"cg-" + c.id + "-" + sk} x1={LX.cands} y1={cY(ci) + 22} x2={LX.skills + 118} y2={sY(si) + 12}
            stroke={C.red} strokeWidth={on ? 1 : 0.2} opacity={on ? 0.3 : 0.02} strokeDasharray="2,2" style={{ transition: "all 0.3s" }} />;
        }))}
        {/* Activity->Skill provenance (on hover) */}
        {GRAPH_CANDS.map((c, ci) => c.activities.map((a, ai) => a.evidences.map(sk => {
          const si = SKILLS.findIndex(s => s.id === sk); if (si < 0) return null;

          return <line key={"as-" + ci + "-" + ai + "-" + sk} x1={LX.acts} y1={aY(ci, ai) + 11} x2={LX.skills + 118} y2={sY(si) + 12}
            stroke="#f59e0b" strokeWidth={on ? 0.8 : 0} opacity={on ? 0.2 : 0} strokeDasharray="1,2" style={{ transition: "all 0.4s" }} />;
        })))}
        {/* Cand->Activity */}
        {GRAPH_CANDS.map((c, ci) => c.activities.map((a, ai) => {
          const on = isCa(c);
          return <line key={"ca-" + c.id + "-" + ai} x1={LX.cands + 155} y1={cY(ci) + 22} x2={LX.acts} y2={aY(ci, ai) + 11}
            stroke="#f59e0b" strokeWidth={on ? 0.6 : 0.15} opacity={on ? 0.2 : 0.02} strokeDasharray="2,2" style={{ transition: "all 0.3s" }} />;
        }))}

        {/* LAYER 1: Tasks */}
        {GRAPH_TASKS.map((t, i) => {
          const on = isTa(t); const ac = t.assign === "agent" ? C.green : t.assign === "hybrid" ? C.blue : C.amber;

        {/* LAYER 2: Skills (market signals + adjacency) */}
        {SKILLS.map((sk, i) => {
          const on = isSa(sk.id); const d = demS.has(sk.id); const s = bestS.has(sk.id);
          const m = d && s; const g = d && !s;
          return <g key={sk.id} onMouseEnter={() => setHov({ type: "skill", id: sk.id })} onMouseLeave={() => setHov(null)} style={{ cursor: "pointer" }}>
            <rect x={LX.skills} y={sY(i)} width={118} height={24} rx={12}
              fill={on ? (m ? C.greenBg : g ? "#fef2f2" : "#f5f3ff") : C.bg}
              stroke={on ? (m ? C.greenBorder : g ? "#fecaca" : "#c4b5fd") : C.border}
              strokeWidth={on ? 1.5 : 0.7} opacity={on ? 1 : 0.2} style={{ transition: "all 0.3s" }} />
            <text x={LX.skills + 8} y={sY(i) + 15} fontSize="9" fontWeight="600"
              fill={on ? (m ? C.green : g ? C.red : "#6d28d9") : C.slateLight}>{sk.id}</text>
            <text x={LX.skills + 105} y={sY(i) + 15} fontSize="9" fontWeight="700"
              fill={mC(sk.market)} opacity={on ? 1 : 0.3}>{mI(sk.market)}</text>
          </g>;
        })}

        {/* LAYER 3: Candidates (with trajectory) */}
        {GRAPH_CANDS.map((c, i) => {
          const on = isCa(c); const best = i === 2;
          return <g key={c.id} onMouseEnter={() => setHov({ type: "cand", id: c.id })} onMouseLeave={() => setHov(null)} style={{ cursor: "pointer" }}>
            <rect x={LX.cands} y={cY(i) - 12} width={155} height={76} rx={8}
              fill={on ? (best ? C.greenBg : C.blueBg) : C.card}
              stroke={on ? (best ? C.greenBorder : C.blueBorder) : C.border}
              strokeWidth={on ? 1.5 : 0.7} opacity={on ? 1 : 0.2} style={{ transition: "all 0.3s" }} />
            <text x={LX.cands + 8} y={cY(i) + 5} fontSize="11" fontWeight="600" fill={on ? C.slate : C.slateLight}>{c.name}</text>
            <text x={LX.cands + 8} y={cY(i) + 18} fontSize="8" fill={on ? C.slateMd : "#cbd5e1"}>{c.sub}</text>

            {on && c.trajectory.map((step, si) => {
              const tx = LX.cands + 8 + si * 34; const ty = cY(i) + 50;
              return <g key={si}>
                <circle cx={tx + 4} cy={ty} r={2.5} fill={step.p ? C.blueBg : C.blue} stroke={step.p ? C.blueBorder : C.blue} strokeWidth={0.8} />
                {si > 0 && <line x1={tx - 26} y1={ty} x2={tx} y2={ty} stroke={C.blueBorder} strokeWidth={0.6} strokeDasharray={step.p ? "2,2" : "none"} />}
                <text x={tx + 4} y={ty + 10} textAnchor="middle" fontSize="6" fill={step.p ? C.blue : C.slateMd}>{step.t}</text>
              </g>;

          </g>;
        })}

        {/* LAYER 4: Activities (with logos + provenance) */}
        {GRAPH_CANDS.map((c, ci) => c.activities.map((a, ai) => {
          const on = isCa(c); const isH = ha?.ci === ci && ha?.ai === ai;
          return <g key={"a-" + ci + "-" + ai}

  { task: "Monitor & triage", type: "H+AI", model: "Blended", cost: "$620/mo", period: "Agent+Human" },
  { task: "Data pipelines", type: "AI", model: "Per-job", cost: "$120/mo", period: "DataPipeline" },
  { task: "Eval reports", type: "H+AI", model: "Blended", cost: "$1.1K/mo", period: "DocGen+Human" },
  { task: "Security scan", type: "AI", model: "Per-scan", cost: "$450/mo", period: "SecurityScan" },
  { task: "Analyze patterns", type: "H+AI", model: "Blended", cost: "$2.2K/mo", period: "Research+Human" },
];

function CommitStep({ onComplete }) {
  const [s1, setS1] = useState(false), [s2, setS2] = useState(false);
  useEffect(() => { setTimeout(() => setS1(true), 1200); setTimeout(() => setS2(true), 2200);
    setTimeout(() => { if (onComplete) onComplete(); }, 4000); }, []);
  return (
    <div style={{ padding: "18px 32px", maxWidth: 1200, margin: "0 auto" }}>
      <FadeIn delay={100}><p style={{ fontSize: "12px", color: C.slateMd, margin: "0 0 12px" }}>Each task priced by engagement model — project, time-based, per-outcome, or blended.</p></FadeIn>
      <div style={{ background: C.card, borderRadius: "10px", border: `1px solid ${C.border}`, overflow: "hidden", marginBottom: "12px" }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 55px 65px 65px 80px", padding: "6px 12px", borderBottom: `1px solid ${C.border}`, fontSize: "9px", fontWeight: 700, letterSpacing: "1px", color: C.slateLight, background: C.bg }}><span>TASK</span><span>TYPE</span><span>MODEL</span><span>COST</span><span>PERIOD</span></div>
        <div style={{ maxHeight: 220, overflowY: "auto" }}>{COSTS.map((r, i) => <FadeIn key={i} delay={100 + i * 50}><div style={{ display: "grid", gridTemplateColumns: "1fr 55px 65px 65px 80px", padding: "6px 12px", borderBottom: `1px solid ${C.bg}`, fontSize: "11px", alignItems: "center" }}><span style={{ color: C.slate }}>{r.task}</span><Tag>{r.type}</Tag><Tag>{r.model}</Tag><span style={{ fontWeight: 600, color: C.slate }}>{r.cost}</span><span style={{ fontSize: "10px", color: C.slateLight }}>{r.period}</span></div></FadeIn>)}</div>
      </div>
      {s1 && <FadeIn delay={0}><div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: "8px", marginBottom: "10px" }}>{[{ l: "Human (1x)", v: "$50K" }, { l: "Human/mo", v: "$4.8K" }, { l: "AI Agents", v: "$1.1K/mo" }, { l: "Blended", v: "$3.9K/mo" }].map((i, j) => <div key={j} style={{ background: C.card, borderRadius: "8px", border: `1px solid ${C.border}`, padding: "10px", textAlign: "center" }}><div style={{ fontSize: "9px", fontWeight: 700, color: C.slateLight }}>{i.l}</div><div style={{ fontSize: "20px", fontWeight: 300, color: C.slate }}>{i.v}</div></div>)}</div></FadeIn>}
      {s2 && <FadeIn delay={0}><div style={{ display: "flex", gap: "10px" }}><div style={{ flex: 1, background: C.bg, borderRadius: "8px", border: `1px solid ${C.border}`, padding: "10px", textAlign: "center" }}><div style={{ fontSize: "10px", color: C.slateLight }}>Traditional FTE</div><div style={{ fontSize: "22px", fontWeight: 300, color: C.slateLight }}>$442K/yr</div></div><div style={{ display: "flex", alignItems: "center" }}><ArrowRight size={14} color={C.green} /></div><div style={{ flex: 1, background: C.greenBg, borderRadius: "8px", border: `1px solid ${C.greenBorder}`, padding: "10px", textAlign: "center" }}><div style={{ fontSize: "10px", color: C.green, fontWeight: 700 }}>Task-based</div><div style={{ fontSize: "22px", fontWeight: 300, color: C.green }}>~$168K/yr</div></div></div></FadeIn>}
    </div>
  );
}

/* ═══════ LEARN ═══════ */
function LearnStep() {
  const [ac, setAc] = useState(null), [sb, setSb] = useState(false);
  useEffect(() => { const s=[0,1,2,0,1,2]; let i=0; const iv=setInterval(()=>{if(i<s.length){setAc(s[i]);i++;}else{clearInterval(iv);setTimeout(()=>setSb(true),400);}},1200); return()=>clearInterval(iv); }, []);
  const cols = [
    { stage: "SENSE", icon: Target, captures: ["Task decomposition accuracy at 90 days?", "Attrition flag real or false alarm?", "Skill gap ramp-up time → refines estimates"], result: "Gaps detected earlier. Decompositions sharper." },
    { stage: "MATCH", icon: Search, captures: ["Which pool yielded the hire?", "Which work-evidence predicted success?", "Internal ramp = 3mo baseline"], result: "Evidence criteria evolve by real performance." },
    { stage: "COMMIT", icon: DollarSign, captures: ["Task pricing accepted?", "Scope accuracy?", "Agent costs vs. projection?"], result: "Pricing refined. Cost models sharpened." },
  ];
  return (
    <div style={{ padding: "18px 32px", maxWidth: 1200, margin: "0 auto" }}>
      <FadeIn delay={100}><p style={{ fontSize: "12px", color: C.slateMd, margin: "0 0 12px" }}>Every hire feeds data back into detection, evaluation, and engagement.</p></FadeIn>
      <div style={{ display: "flex", gap: "10px", marginBottom: "12px" }}>{cols.map((col, i) => { const active = ac !== null && ac >= i, hl = ac === i; const Icon = col.icon; return <div key={i} style={{ flex: 1, background: C.card, borderRadius: "10px", border: `1px solid ${hl ? C.blueBorder : C.border}`, padding: "12px", transition: "all 0.4s" }}><div style={{ display: "flex", alignItems: "center", gap: "5px", marginBottom: "8px" }}><div style={{ width: 20, height: 20, borderRadius: "4px", background: C.blueBg, display: "flex", alignItems: "center", justifyContent: "center" }}><Icon size={10} color={C.blue} /></div><span style={{ fontSize: "10px", fontWeight: 700, color: C.blue }}>{col.stage}</span>{hl && <div style={{ width: 5, height: 5, borderRadius: "50%", background: C.blue, animation: "pulse 0.8s infinite", marginLeft: "auto" }} />}</div>{col.captures.map((c, j) => <div key={j} style={{ fontSize: "10px", color: C.slateMd, lineHeight: 1.5, padding: "2px 0", opacity: active ? 1 : 0.2, transition: "opacity 0.5s" }}>{c}</div>)}<div style={{ display: "flex", gap: "4px", marginTop: "8px", padding: "6px", background: C.blueBg, borderRadius: "5px", opacity: active ? 1 : 0.15, transition: "opacity 0.5s" }}><RotateCcw size={9} color={C.blue} style={{ marginTop: 1, flexShrink: 0 }} /><span style={{ fontSize: "9px", color: C.blue, fontWeight: 500, lineHeight: 1.3 }}>{col.result}</span></div></div>; })}</div>
      {sb && <FadeIn delay={0}><div style={{ display: "flex", gap: "10px", marginBottom: "10px" }}><div style={{ flex: 1, background: C.bg, borderRadius: "8px", border: `1px solid ${C.border}`, padding: "10px", textAlign: "center" }}><div style={{ fontSize: "9px", color: C.slateLight, fontWeight: 700 }}>HIRE #1</div><div style={{ fontSize: "10px", color: C.slateLight }}>Cold start. Generic criteria.</div></div><div style={{ display: "flex", alignItems: "center" }}><ArrowRight size={12} color={C.blue} /></div><div style={{ flex: 1, background: C.blueBg, borderRadius: "8px", border: `1px solid ${C.blueBorder}`, padding: "10px", textAlign: "center" }}><div style={{ fontSize: "9px", color: C.blue, fontWeight: 700 }}>HIRE #10</div><div style={{ fontSize: "10px", color: C.blue, opacity: 0.85 }}>Predicts, knows channels, evaluates right signals, prices accurately.</div></div></div><div style={{ textAlign: "center", padding: "14px", background: C.card, borderRadius: "10px", border: `1px solid ${C.border}` }}><span style={{ fontSize: "14px", color: C.slate }}>Every hire makes the next one smarter. </span><span style={{ fontSize: "14px", color: C.blue, fontWeight: 600 }}>If it doesn't, it's not AI-native.</span></div></FadeIn>}
    </div>
  );
}

/* ═══════ INTRO CARDS ═══════ */
const INTROS = [
  { // SENSE
    label: "SENSE",
    title: "From static roles and JDs to predictive task graphs",
    bullets: [
      "Hiring starts from problems, not titles. Work becomes decomposable — each role replaced by a dynamic task graph of atomic, evolving units of work that can be fulfilled in multiple ways: hire, redeploy, or automate.",
      "The system continuously monitors OKRs, project backlogs, attrition signals, and team dependencies to predict unmet work capacity — before anyone raises a requisition.",
      "A living talent graph — built from GitHub activity, publications, career trajectories, and internal performance — replaces static resumes. Capability becomes observable through actual performance, not self-reported credentials.",
      "Skills sit at the center as the atomic unit connecting work demand to talent supply. Every candidate is scored on demonstrated skills and learnability — not keywords."
    ],
    from: "Static JDs, episodic hiring triggered by vacancies, resumes as proxies for capability",
    to: "Continuous sensing of capability gaps, dynamic task graphs, and living talent profiles built from real signals"
  },
  { // MATCH
    label: "MATCH",
    title: "From interviews to observed work and simulation",
    bullets: [
      "The best signal comes from observed work, not self-reports about past work. Candidates are evaluated in real task environments — through code contributions, published research, and work simulations.",
      "The system analyzes actual code commits, publication methodology, citation patterns, and live task responses — generating structured evidence mapped to specific skills.",
      "Any evidence of work — from any source, at any time — that reduces uncertainty about future success is treated as a signal. Matching becomes continuous, not episodic.",
      "The output is an evidence-based scorecard — not subjective interview notes. Every skill rating traces back to the work product that demonstrated it."
    ],
    from: "Time-bounded interviews, indirect signals, interviewer bias, and artificial context",
    to: "Real work products reveal decisions, trade-offs, and adaptability — turning assessment into a compounding data asset"
  },
  { // COMMIT
    label: "COMMIT",
    title: "From one-time offers to continuous, task-based engagement",
    bullets: [
      "Employment becomes a fluid, evolving engagement matched to tasks, performance, and mutual fit. Hiring ceases to be a moment and becomes continuous matching of people to work.",
      "Each predicted task is priced individually — project-based for one-time deliverables, time-based for ongoing fractional work, per-outcome for AI agents, and blended for human+AI collaboration.",
      "AI agent costs are measured by output: cost per benchmark run, cost per test generated. Human costs flex between project, time-based, and blended models."
    ],
    from: "A one-time, take-it-or-leave-it offer with terms locked at hire",
    to: "Flexible, task-level engagement that adapts to evolving work and capability needs"
  },
  { // LEARN
    label: "LEARN",
    title: "From resetting every hire to compounding institutional intelligence",
    bullets: [
      "Most recruitment operates as a sequence of events that resets every time. An AI-native system treats every hire as training data — the start of developing institutional intelligence.",
      "SENSE learns: was the task decomposition accurate at 90 days? Was the attrition flag real? How long did the skill gap take to close?",
      "MATCH learns: which sourcing channel yielded the hire? Which assessment signals predicted on-the-job success? Which didn't?",
      "COMMIT learns: was the task-based pricing accepted? Were project scopes accurate? Did agent costs match projections? Every data point sharpens the next offer."
    ],
    from: "Sequential workflow, triggered by vacancy, resets every time",
    to: "An always-on intelligence system that compounds over time — the system gets smarter with every hire"
  },
];

function IntroCard({ intro, onProceed, onReplay }) {
  return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: 500, padding: "40px" }}>
      <div style={{ maxWidth: 680, textAlign: "center" }}>
        <FadeIn delay={100}>
          <div style={{ fontSize: "10px", fontWeight: 700, letterSpacing: "4px", color: C.blue, marginBottom: "8px" }}>{intro.label}</div>
        </FadeIn>
        <FadeIn delay={250}>
          <div style={{ fontSize: "22px", fontWeight: 300, color: C.slate, lineHeight: 1.4, marginBottom: "28px" }}>{intro.title}</div>
        </FadeIn>
        <FadeIn delay={450}>
          <div style={{ textAlign: "left", marginBottom: "28px" }}>
            {intro.bullets.map((b, i) => (
              <div key={i} style={{ display: "flex", gap: "10px", alignItems: "flex-start", padding: "6px 0" }}>
                <div style={{ width: 5, height: 5, borderRadius: "50%", background: C.blue, marginTop: 6, flexShrink: 0, opacity: 0.4 }} />
                <span style={{ fontSize: "13px", color: C.slateMd, lineHeight: 1.6 }}>{b}</span>
              </div>
            ))}
          </div>
        </FadeIn>
        <FadeIn delay={700}>
          <div style={{ display: "flex", gap: "16px", alignItems: "center", justifyContent: "center", marginBottom: "28px" }}>
            <div style={{ flex: 1, padding: "12px 16px", background: C.bg, borderRadius: "8px", border: `1px solid ${C.border}`, textAlign: "center" }}>
              <div style={{ fontSize: "9px", fontWeight: 700, color: C.slateLight, letterSpacing: "1px", marginBottom: "4px" }}>FROM</div>
              <div style={{ fontSize: "12px", color: C.slateLight, lineHeight: 1.4 }}>{intro.from}</div>
            </div>
            <ArrowRight size={16} color={C.slate} />
            <div style={{ flex: 1, padding: "12px 16px", background: "#e2e8f0", borderRadius: "8px", border: "1px solid #cbd5e1", textAlign: "center" }}>
              <div style={{ fontSize: "9px", fontWeight: 700, color: C.slate, letterSpacing: "1px", marginBottom: "4px" }}>TO</div>
              <div style={{ fontSize: "12px", color: C.slate, lineHeight: 1.4 }}>{intro.to}</div>
            </div>
          </div>
        </FadeIn>
        <FadeIn delay={900}>
          <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: "16px" }}>
            {onReplay && <button onClick={onReplay} style={{
              display: "inline-flex", alignItems: "center", gap: "6px", padding: "12px 24px", borderRadius: "8px",
              border: "1px solid " + C.border, background: C.card, color: C.slateMd,
              fontSize: "13px", cursor: "pointer"
            }}><RotateCcw size={14} /> Replay from Beginning</button>}
          <button onClick={onProceed} style={{
            display: "inline-flex", alignItems: "center", gap: "8px", padding: "12px 32px", borderRadius: "8px",
            border: "none", background: C.blue, color: "#fff",
            fontSize: "14px", fontWeight: 600, cursor: "pointer", transition: "all 0.2s"
          }}>
            Proceed <ArrowRight size={16} />
          </button>
          </div>
        </FadeIn>
      </div>
    </div>
  );
}

/* ═══════ MAIN ═══════ */
// Steps: -1=title, 0=SENSE intro, 1=SENSE, 2=MATCH intro, 3=MATCH, 4=COMMIT intro, 5=COMMIT, 6=LEARN intro, 7=LEARN
function App() {
  const [step, setStep] = useState(-1), [fading, setFading] = useState(false), [playing, setPlaying] = useState(true), [matchDone, setMatchDone] = useState(false), [commitDone, setCommitDone] = useState(false);
  const goTo = useCallback((n) => { setFading(true); setTimeout(() => { setStep(n); setFading(false); setMatchDone(false); setCommitDone(false); }, 300); }, []);

  // No auto-advance — all transitions are user-controlled

  // Which section is active (0-3)
  const activeSection = step <= 0 ? 0 : step <= 1 ? 0 : step <= 3 ? 1 : step <= 5 ? 2 : 3;

  // Next content step for "Proceed" button
  const nextIntroStep = step === 1 ? 2 : step === 3 ? 4 : step === 5 ? 6 : null;

  return (
    <div style={{ minHeight: "100vh", background: C.bg, fontFamily: "'DM Sans', system-ui, sans-serif", color: C.slate, display: "flex", flexDirection: "column" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap');@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.2}}@keyframes fadeSlideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}*{box-sizing:border-box}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}`}</style>
      <div style={{ background: C.card, borderBottom: `1px solid ${C.border}` }}>
        <div style={{ padding: "10px 32px 0", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div><div style={{ fontSize: "9px", fontWeight: 700, letterSpacing: "3px", color: C.blue }}>AI-NATIVE RECRUITMENT</div><div style={{ fontSize: "16px", fontWeight: 400, color: C.slate }}>One Hire, End-to-End</div></div>
          <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
            <span style={{ fontSize: "10px", color: C.slateLight }}>Staff AI/ML Engineer · People Technology</span>
            <button onClick={() => setPlaying(!playing)} style={{ width: 26, height: 26, borderRadius: "50%", border: `1px solid ${C.border}`, background: C.card, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" }}>{playing ? <Pause size={10} color={C.slateMd} /> : <Play size={10} color={C.slateMd} />}</button>
          </div>
        </div>
        <div style={{ display: "flex", padding: "6px 32px 8px", gap: "4px" }}>{SECTIONS.map((s, i) => (
          <div key={i} onClick={() => goTo(i * 2)} style={{ flex: 1, cursor: "pointer", padding: "4px 8px", borderRadius: "5px", background: activeSection === i ? C.blueBg : "transparent", border: activeSection === i ? `1px solid ${C.blueBorder}` : "1px solid transparent", transition: "all 0.3s" }}>
            <div style={{ fontSize: "9px", fontWeight: 700, letterSpacing: "1.5px", color: activeSection === i ? C.blue : i < activeSection ? "#93c5fd" : "#cbd5e1" }}>{s.label}</div>
            <div style={{ fontSize: "9px", color: activeSection === i ? C.slateMd : "#cbd5e1" }}>{s.sub}</div>
          </div>
        ))}</div>
      </div>
      <div style={{ flex: 1, opacity: fading ? 0 : 1, transition: "opacity 0.3s", minHeight: 500, overflowY: "auto" }}>
        {step === -1 && <div style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: 500, flexDirection: "column", gap: "12px" }}>
          <FadeIn delay={100}><div style={{ fontSize: "10px", fontWeight: 700, letterSpacing: "4px", color: C.blue }}>AI-NATIVE RECRUITMENT</div></FadeIn>
          <FadeIn delay={300}><div style={{ fontSize: "22px", fontWeight: 300, color: C.slate }}>One Hire, End-to-End</div></FadeIn>
          <FadeIn delay={600}><div style={{ fontSize: "12px", color: C.slateLight, marginTop: "4px" }}>A simulation of what recruitment looks like when AI is the starting assumption</div></FadeIn>
          <FadeIn delay={900}><button onClick={() => goTo(0)} style={{ marginTop: "20px", display: "inline-flex", alignItems: "center", gap: "8px", padding: "12px 32px", borderRadius: "8px", border: "none", background: C.blue, color: "#fff", fontSize: "14px", fontWeight: 600, cursor: "pointer" }}>Begin <ArrowRight size={16} /></button></FadeIn>
        </div>}
        {step === 0 && <IntroCard intro={INTROS[0]} onProceed={() => goTo(1)} onReplay={() => setStep(-1)} />}
        {step === 1 && <SenseStep onProceedToMatch={() => goTo(2)} onReplay={() => { setStep(-1); }} />}
        {step === 2 && <IntroCard intro={INTROS[1]} onProceed={() => goTo(3)} onReplay={() => setStep(-1)} />}
        {step === 3 && <MatchStep onComplete={() => setMatchDone(true)} />}
        {step === 4 && <IntroCard intro={INTROS[2]} onProceed={() => goTo(5)} onReplay={() => setStep(-1)} />}
        {step === 5 && <CommitStep onComplete={() => setCommitDone(true)} />}
        {step === 6 && <IntroCard intro={INTROS[3]} onProceed={() => goTo(7)} onReplay={() => setStep(-1)} />}
        {step === 7 && <LearnStep />}
        {/* Navigation */}
        {step >= 1 && step % 2 === 1 && step !== 1 && (
          <div style={{ padding: "12px 32px 20px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <button onClick={() => { setStep(-1); setPlaying(true); }} style={{ display: "flex", alignItems: "center", gap: "6px", padding: "8px 16px", borderRadius: "8px", border: `1px solid ${C.border}`, background: C.card, color: C.slateMd, fontSize: "12px", cursor: "pointer" }}><RotateCcw size={12} /> Replay from Beginning</button>
            {nextIntroStep !== null && <button onClick={((step === 3 && !matchDone) || (step === 5 && !commitDone)) ? undefined : () => goTo(nextIntroStep)} disabled={(step === 3 && !matchDone) || (step === 5 && !commitDone)} style={{ 
              display: "flex", alignItems: "center", gap: "6px", padding: "10px 24px", borderRadius: "8px", 
              border: `1px solid ${((step === 3 && !matchDone) || (step === 5 && !commitDone)) ? "#94a3b8" : C.blue}`, 
              background: ((step === 3 && !matchDone) || (step === 5 && !commitDone)) ? "#f1f5f9" : C.blueBg, 
              color: ((step === 3 && !matchDone) || (step === 5 && !commitDone)) ? "#94a3b8" : C.blue, 
              fontSize: "13px", fontWeight: 600, 
              cursor: ((step === 3 && !matchDone) || (step === 5 && !commitDone)) ? "default" : "pointer",
              opacity: ((step === 3 && !matchDone) || (step === 5 && !commitDone)) ? 0.7 : 1,
              transition: "all 0.5s"
            }}>
              {step === 3 ? "Proceed to Engagement" : step === 5 ? "Proceed to Learning Loop" : ""} <ArrowRight size={14} />
            </button>}
          </div>
        )}
      </div>
    </div>
  );
}


    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
